<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f6f6f6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            padding: 20px 0;
            color: #ffffff;
            border-radius: 5px 5px 0 0;
        }

        .header h1 {
            margin: 0;
        }

        .content {
            padding: 20px;
            color: #333333;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="https://corporate.bdjobs.com/logos/180516_0.png" alt="Betopia Group"
                style="max-width: 200px; height: auto;">
        </div>
        <div class="content">
            <h2>Appointment Confirmed</h2>
            <p>Dear {{ name }},</p>
            <p>Your appointment has been successfully scheduled.</p>

            <p><strong>Appointment Details:</strong></p>
            <ul>
                <li><strong>Time:</strong> {{ appointment_time }}</li>
                <li><strong>Service:</strong> {{ description|default:"General Service" }}</li>
            </ul>

            <p>We look forward to seeing you!</p>
        </div>
        <div class="footer">
            <p>&copy; {% now "Y" %} Betopia Group. All rights reserved.</p>
        </div>
    </div>
</body>

</html>
